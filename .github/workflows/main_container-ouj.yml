# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - container-ouj

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: crouj.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_75F29301F6674778A2B12DB014CE3676 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_C109B9E27610424FB7AB2B5C4575A097 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: crouj.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_75F29301F6674778A2B12DB014CE3676 }}/guestbook:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'container-ouj'
          slot-name: 'Production'
          images: 'crouj.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_75F29301F6674778A2B12DB014CE3676 }}/guestbook:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B10485A8497F4713A893CA88C8AD8A61 }}